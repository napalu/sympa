name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    environment:
      name: release-signing
      deployment: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Import code signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_CERT_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          rm "$RUNNER_TEMP/cert.p12"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Debug available signing identities
        run: security find-identity -v -p codesigning
        
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          CODESIGN_IDENTIFIER: ${{ secrets.CODESIGN_IDENTIFIER }}
          

      - name: Verify macOS signatures
        shell: bash
        run: |
          shopt -s nullglob
          for bin in dist/*_darwin_*/*; do
            if file "$bin" | grep -q "Mach-O"; then
              echo "Checking $bin"
              codesign -dv --verbose=4 "$bin" 2>&1 | egrep 'Signature=|Authority=|TeamIdentifier='
              codesign --verify --deep --strict --verbose=2 "$bin"
            fi
          done
                    
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
