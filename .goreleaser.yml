version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: sympa
    main: ./cmd/sympa
    binary: sympa
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    hooks:
      post:
        - cmd: ./scripts/codesign.sh {{ if eq .Os "darwin" }}{{ .Path }}{{ else }}noop{{ end }}

archives:
  - formats: ['tar.gz']
    name_template: "sympa_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: napalu
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/napalu/sympa"
    description: "Symmetric-only password store wrapping age"
    license: "MIT"
    install: |
      bin.install "sympa"
    test: |
      system "#{bin}/sympa", "--version"
